name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libglib2.0-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Rust
        run: rustup update stable
      - name: Run tests
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup update stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf o2cloud-${{ matrix.target }}.tar.gz o2cloud

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: o2cloud-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/o2cloud-${{ matrix.target }}.tar.gz

  build-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps (WebKitGTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libglib2.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        run: rustup update stable

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar -czf o2cloud-x86_64-unknown-linux-gnu.tar.gz o2cloud

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: o2cloud-x86_64-unknown-linux-gnu
          path: target/release/o2cloud-x86_64-unknown-linux-gnu.tar.gz

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup update stable

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          cd target/release
          Compress-Archive -Path o2cloud.exe -DestinationPath o2cloud-x86_64-pc-windows-msvc.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: o2cloud-x86_64-pc-windows-msvc
          path: target/release/o2cloud-x86_64-pc-windows-msvc.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifacts
        run: find artifacts -type f -exec mv {} artifacts/ \; && find artifacts -type d -empty -delete

      - name: Release
        run: gh release create ${{ github.ref_name }} artifacts/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system deps (WebKitGTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libglib2.0-dev

      - name: Install Rust
        run: rustup update stable

      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
