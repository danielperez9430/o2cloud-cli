name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf o2cloud-${{ matrix.target }}.tar.gz o2cloud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: o2cloud-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/o2cloud-${{ matrix.target }}.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (WebKitGTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        run: rustup update stable

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar -czf o2cloud-x86_64-unknown-linux-gnu.tar.gz o2cloud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: o2cloud-x86_64-unknown-linux-gnu
          path: target/release/o2cloud-x86_64-unknown-linux-gnu.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: o2cloud-*
          merge-multiple: true
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
